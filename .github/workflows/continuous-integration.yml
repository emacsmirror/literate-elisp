name: Continous Integration
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Support policy: Emacs > 30.0 only.  30.1 = Package-Requires floor and
        # first version with `internal--get-default-lexical-binding-function'
        # (the hook the cookie support relies on).  snapshot = current master.
        emacs_version: ['30.1', 'snapshot']
    steps:
      - uses: actions/checkout@v4
      - uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs_version }}

      - name: ert suite (literate-elisp.org + readme.org)
        run: |
          emacs -Q --batch -L . \
            --load literate-elisp \
            --eval "(setf literate-elisp-test-p t)" \
            --funcall literate-elisp-batch-load literate-elisp.org \
            --funcall literate-elisp-batch-load readme.org \
            --funcall ert-run-tests-batch-and-exit

      - name: lexical-binding regression — no-cookie file stays dynamic (all versions)
        run: |
          emacs -Q --batch -L . -l literate-elisp \
            --eval "(literate-elisp-load \"./tests/test-no-cookie.org\")" \
            --eval "(literate-elisp-test-no-cookie-run)"

      - name: lexical-binding cookie repro — 3 lambda-capture tests (snapshot only)
        # The fix requires `internal--get-default-lexical-binding-function',
        # which lives in Emacs master (no released 30.x has it; will ship in 31).
        # On older Emacs the boundp guard makes the fix a no-op, so these repros
        # would still fail by design — exclude them.
        if: matrix.emacs_version == 'snapshot'
        run: |
          emacs -Q --batch -L . -l literate-elisp \
            --eval "(literate-elisp-load \"./tests/test-lexical-binding.org\")" \
            --eval "(literate-elisp-test-run-all)"
